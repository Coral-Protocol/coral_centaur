edition = 3

[agent]
name = "puppet-agent"
version = "0.1.0"
description = "Orchestrator proxy agent — relay identity for the main Centaur agent"

readme = "Puppet dummy agent for Coral Protocol"
summary = "A minimal agent that connects to Coral and stays alive as the orchestrator's proxy"

[agent.license]
type = "spdx"
expression = "MIT"

[options.auto_launch]
type = "string"
default = "false"

[runtimes.executable]
path = "bash"
arguments = ["startup.sh"]
transport = "streamable_http"
